<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historias de Usuario en Proyecto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <header>
        <div class="header-content">
            <h1 id="logo" onclick="window.location.href='index.html'" style="cursor: pointer;">Taiga Metricas</h1>
            <nav>
                <a href="index.html" class="active">Dashboard</a>
                <a href="settings.html">Configuracion</a>
                <button id="theme-toggle" class="theme-toggle" title="Cambiar tema">
                    <!-- Icon populated by theme.js -->
                </button>
            </nav>
            <div class="header-actions">
                <button id="backBtn" class="back-btn">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path fill-rule="evenodd"
                            d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z" />
                    </svg>
                    <span>Atras</span>
                </button>
                <div id="stats" class="stats">Cargando...</div>
                <button id="logoutBtn" class="btn logout-btn" title="Cerrar sesión" style="margin-left:0.5rem;">Salir</button>
            </div>
        </div>
    </header>

    <main id="main">
        <div id="projectMetricsBar" class="metrics-bar">
            <div class="filter-form">
                <h2 id="projectNameDisplay" style="margin: 0; color: var(--accent-color);">Nombre del Proyecto</h2>
                <div class="input-group">
                    <label for="startDate">Creada desde</label>
                    <input type="date" id="startDate">
                </div>
                <div class="input-group">
                    <label for="endDate">En Prod hasta</label>
                    <input type="date" id="endDate">
                </div>
                <button id="calculateBtn" class="calculate-btn">Calcular</button>
            </div>

            <div id="projectMetricsResults" class="global-metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">TIEMPO DE ENTREGA</div>
                    <div id="projectLeadTime" class="metric-value">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">TIEMPO DE CICLO</div>
                    <div id="projectCycleTime" class="metric-value">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">THROUGHPUT</div>
                    <div id="projectThroughput" class="metric-value">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">WIP</div>
                    <div id="projectWIP" class="metric-value">--</div>
                </div>
            </div>
            <div id="metricsLoading" class="metrics-loading hidden">
                <div class="loader"></div>
                <span>Analizando historias...</span>
            </div>
        </div>

        <div id="listView" class="table-container">
            <div class="empty-state">Cargando historias...</div>
        </div>

        <!-- History Modal/Section -->
        <div id="historyView" class="history-container hidden" style="margin-top: 2rem;">
            <div class="history-title">
                <div id="historyStoryRef" class="story-ref">REF</div>
                <h2 id="historyStorySubject">Titulo</h2>
            </div>

            <div id="historyMetrics" class="metrics-grid hidden">
                <div class="metric-card">
                    <div class="metric-label">Tiempo Total de Proceso</div>
                    <div id="totalTimeValue" class="metric-value">--</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Tiempo en Progreso</div>
                    <div id="timeInProgressValue" class="metric-value">--</div>
                </div>
            </div>

            <div class="history-table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Tipo de Cambio</th>
                            <th>De</th>
                            <th>A</th>
                            <th>Ocurrido en</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <script type="module" src="./theme.js"></script>
    <script type="module" src="./project.js"></script>
    <script type="module" src="./logout.js"></script>
</body>

</html>
