<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taiga Metrics - Settings</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-content">
            <h1 onclick="window.location.href='index.html'" style="cursor: pointer;">Taiga Metrics</h1>
            <nav>
                <a href="index.html">Dashboard</a>
                <a href="settings.html" class="active">Settings</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="settings-card">
            <h2>Taiga Server Settings</h2>
            <p class="section-desc">Configure your Taiga server connection and credentials.</p>
            
            <form id="settings-form">
                <div class="form-group">
                    <label for="taiga-domain">Taiga Domain</label>
                    <input type="text" id="taiga-domain" placeholder="e.g. taiga.bdp.com.bo" required>
                    <small>The domain where your Taiga server is hosted.</small>
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Your Taiga username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Your Taiga password" required>
                    <small>Your password is used only for validation and is not stored permanently. An auth token will be stored instead.</small>
                </div>

                <div class="button-group">
                    <button type="button" id="test-connection" class="btn secondary">Test Connection</button>
                    <button type="submit" id="save-settings" class="btn primary">Save Settings</button>
                </div>
            </form>

            <div id="status-message" class="status-box hidden"></div>
        </section>
    </main>

    <script type="module" src="settings.js"></script>
</body>
</html>
